            const addNumbers = ()=>{
            var num1 = parseFloat(document.getElementById("num1").value)
            var num2 = parseFloat(document.getElementById("num2").value)
            var result = num1 + num2
            document.getElementById("add").innerHTML = "Addition: " + result
            var mul = num1 * num2
            document.getElementById("Mul").innerHTML = "Multiplication: " + mul
            var sub = num1 - num2
            document.getElementById("Sub").innerHTML = "Subtraction: " + sub
            var div = num1 / num2
            document.getElementById("Div").innerHTML = "Division: " + div
        }

      <input type="number" name="" id="num2">

      <p id="add"></p>
